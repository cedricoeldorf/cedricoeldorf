<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cedric Oeldorf profile header</title>
  <desc id="desc">Monochrome editorial GitHub profile header for Cedric Oeldorf with a restrained poster layout.</desc>
  <rect width="1280" height="320" rx="18" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1278" height="318" rx="17" stroke="#D0D7DE" stroke-width="2"/>
  <rect x="940" y="0" width="340" height="320" rx="18" fill="#0D1117"/>
  <line x1="80" y1="64" x2="336" y2="64" stroke="#0969DA" stroke-width="4"/>
  <line x1="80" y1="96" x2="900" y2="96" stroke="#D8DEE4" stroke-width="1"/>
  <line x1="80" y1="252" x2="900" y2="252" stroke="#D8DEE4" stroke-width="1"/>
  <line x1="80" y1="120" x2="80" y2="252" stroke="#D8DEE4" stroke-width="1"/>
  <line x1="900" y1="120" x2="900" y2="252" stroke="#D8DEE4" stroke-width="1"/>
  <text x="80" y="52" fill="#57606A" font-family="'Courier New', monospace" font-size="17" letter-spacing="2.4">APPLIED AI SYSTEMS</text>
  <text x="80" y="168" fill="#0D1117" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">Cedric Oeldorf</text>
  <text x="80" y="212" fill="#24292F" font-family="Arial, Helvetica, sans-serif" font-size="25">Local-first tools, evaluation, and production AI systems</text>
  <text x="80" y="286" fill="#57606A" font-family="'Courier New', monospace" font-size="18" letter-spacing="1.2">contextOS  /  coeld.io  /  LoGANv2</text>

  <line x1="980" y1="104" x2="1228" y2="104" stroke="#30363D" stroke-width="1"/>
  <line x1="980" y1="176" x2="1228" y2="176" stroke="#30363D" stroke-width="1"/>
  <line x1="980" y1="248" x2="1228" y2="248" stroke="#30363D" stroke-width="1"/>

  <text x="980" y="82" fill="#8B949E" font-family="'Courier New', monospace" font-size="15" letter-spacing="2">CURRENT</text>
  <text x="980" y="138" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Systems</text>
  <text x="980" y="162" fill="#8B949E" font-family="'Courier New', monospace" font-size="15">deployment, evaluation, workflow design</text>

  <text x="980" y="210" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Local AI</text>
  <text x="980" y="234" fill="#8B949E" font-family="'Courier New', monospace" font-size="15">private files, tool use, longer-form reasoning</text>

  <text x="980" y="282" fill="#F0F6FC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Writing</text>
  <text x="980" y="306" fill="#8B949E" font-family="'Courier New', monospace" font-size="15">notes, guides, and public tools</text>
</svg>
